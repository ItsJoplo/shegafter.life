  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: url('homepage/heaven/assets/heaven.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: sans-serif;
    }

    #pedestal {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      width: 300px;
    }

    #sheg {
      position: absolute;
      bottom: 305px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: 250px;
      cursor: pointer; /* Makes Sheg clickable */
    }

    .character {
      position: absolute;
      width: 180px;
      animation: float 3s ease-in-out infinite;
    }

    .wings {
      position: absolute;
      width: 600px;
      left: -300px;
      top: -100px;
      z-index: -1;
    }

    .demon-wings {
      position: absolute;
      width: 600px;
      left: -250px; /* Shifted slightly to the right */
      top: -100px;
      z-index: -1;
    }

    .char-wrapper {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .explosion {
      position: absolute;
      width: 300px;
      height: 300px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      display: none;
    }

    .heaven-gif {
      position: absolute;
      width: 500px;
      height: 500px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      display: none;
      opacity: 0;
      animation: fadeInOut 1s ease-in-out forwards; /* Faster fade-in/out */
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Positions for each character */

    /* demons */
    #oliv { left: 5%; top: 20%; display: none; } 
    #femc { left: 70%; top: 22%; display: none; } 
    #jumbo { left: 35%; top: 10%; display: none; }

    /* epiks */

    #dizzy { left: 78%; top: 71%; }
    #sad { left: 15%; top: 71%; cursor: pointer;}
    #vbucks { left: 85%; top: 18%; }
    #kiske {left: 25%; top: 15%; cursor: pointer;}
    #venom {left: 62%; top: 19%; cursor: pointer;}

  <script>
    function playCrashVideo() {
  // Hide everything else on screen
  document.querySelectorAll('body > *:not(#crash-video):not(script)').forEach(el => {
    el.style.display = 'none';
  });

  // Show and play the video
  const video = document.getElementById('crash-video');
  video.style.display = 'block';
  video.play();

  // Redirect to crash.html after video ends
  video.onended = () => {
    window.location.href = 'crash.html';
  };
}

    let isExploded = false;

    function triggerExplosion() {
      console.log("Explosion triggered!"); // Debugging line

      if (isExploded) {
        // Revert back to normal state
        resetState();
        isExploded = false;
      } else {
        // Show explosion GIF
        document.getElementById('explosion').style.display = 'block';

        // Play explosion sound with a very low volume
        const explosionSound = document.getElementById('explosion-sound');
        explosionSound.volume = 0.1;  // Set volume to 0.1 to make it quieter
        explosionSound.play();

        // Change Sheg to red negative hue
        const sheg = document.getElementById('sheg');
        sheg.style.filter = 'invert(100%) sepia(100%) saturate(5000%) hue-rotate(180deg)';

        // Change background to hell image
        document.body.style.backgroundImage = "url('homepage/hell/assets/hell.png')";
        
        // Hide other images (characters and wings)
        const characters = document.querySelectorAll('.char-wrapper');
        characters.forEach(character => {
          character.style.display = 'none';
        });

        // Show demon wings for oliv, femc, and jumbo
        document.getElementById('oliv').style.display = 'block';
        document.getElementById('femc').style.display = 'block';
        document.getElementById('jumbo').style.display = 'block';
        document.getElementById('dave').style.display = 'block';

        // Set the explosion to play once and stop looping
        const explosion = document.getElementById('explosion');
        explosion.style.animation = "none"; // Stops looping animation if it's a GIF
        explosion.offsetHeight; // Trigger reflow to ensure it stops

        // Mark as exploded
        isExploded = true;

        // Optionally, hide explosion after it plays
        setTimeout(() => {
          // Hide explosion and reset everything
          document.getElementById('explosion').style.display = 'none';
        }, 3000); // Adjust time to match the duration of your explosion GIF
      }
    }

    // Reset everything
    function resetState() {
  // Reset Sheg to normal state
  const sheg = document.getElementById('sheg');
  sheg.style.filter = 'none';

  // Revert background to heaven
  document.body.style.backgroundImage = "url('homepage/heaven/assets/heaven.jpg')";
  
  // Show all images again (characters and wings)
  const characters = document.querySelectorAll('.char-wrapper');
  characters.forEach(character => {
    character.style.display = 'block';
  });

  // Hide demon wings for oliv, femc, and jumbo
 document.getElementById('oliv').style.display = 'none';
  document.getElementById('femc').style.display = 'none';
  document.getElementById('jumbo').style.display = 'none';
  document.getElementById('dave').style.display = 'none';

  // Play heaven sound with a very low volume
  const heavenSound = document.getElementById('heaven-sound');
  heavenSound.volume = 0.1; // Set volume to 0.1 for the heaven sound
  heavenSound.play();

  // Show heaven gif and fade in
  const heavenGif = document.getElementById('heaven-gif');
  heavenGif.style.display = 'block';
  heavenGif.style.animation = 'fadeInOut 1s ease-in-out forwards'; /* Faster fade-in/out */
  
  // Hide heaven gif after fading in and out
  setTimeout(() => {
    heavenGif.style.display = 'none';
  }, 1000); // Adjust this to match the shorter animation time
}


    // Trigger Ky Kiske animation (exclusive click)
    function triggerKiskeAnimation() {
  // Hide Ky Kiske image
  document.getElementById('kiske').style.display = 'none';

  // Play "literallyme.mp3" with a low volume before animation starts
  const audio = new Audio('homepage/heaven/sounds/literallyme.mp3');
  audio.volume = 0.1; // Set the audio volume to 0.1 (quieter)
  audio.play();

  // Show "install.gif" covering the screen
  const installGif = document.createElement('img');
  installGif.src = 'homepage/heaven/characters/kiske/install.gif'; // Assuming you uploaded the install.gif
  installGif.style.position = 'fixed';
  installGif.style.top = 0;
  installGif.style.left = 0;
  installGif.style.width = '100vw';
  installGif.style.height = '100vh';
  installGif.style.zIndex = '9999';
  document.body.appendChild(installGif);

  // Fade out "install.gif"
  setTimeout(() => {
    installGif.style.transition = 'opacity 1s';
    installGif.style.opacity = 0;
  }, 2000);

  // After the "install.gif" animation ends, remove it and start creating ride images
  setTimeout(() => {
    installGif.remove();

    // Create 20 "ride.png" elements with random vertical positions, heights, and speeds
    let rideImages = [];
    for (let i = 0; i < 20; i++) {
      const rideImage = document.createElement('img');
      rideImage.src = 'homepage/heaven/characters/kiske/ride.png';  // Assuming ride.png is uploaded
      rideImage.style.position = 'absolute';
      rideImage.style.left = '-100px'; // Start off the screen on the left
      rideImage.style.top = `${Math.random() * window.innerHeight}px`; // Random vertical position
      rideImage.style.height = `${Math.random() * 100 + 50}px`; // Random height between 50px and 150px
      rideImage.style.transition = `left ${Math.random() * 4 + 3}s linear`; // Random speed between 3 and 7 seconds

      document.body.appendChild(rideImage);
      rideImages.push(rideImage);
      
      // Trigger the animation to move the image to the right
      setTimeout(() => {
        rideImage.style.left = `${window.innerWidth + 100}px`; // Move to the right
      }, 50); // Start the animation slightly after being added
    }

    // Remove images after they reach the right side and reset everything
    setTimeout(() => {
      rideImages.forEach(rideImage => {
        rideImage.remove();
      });
      resetState();
      audio.pause(); // Stop the audio when reset is complete
      audio.currentTime = 0; // Reset audio to start for next play
    }, 7000); // After the images have moved across the screen
  }, 3000); // Adjust time to match the length of your install.gif
}


  // VENOM TRIGGER

  let venomAudio; // Declare venomAudio globally to be accessible across functions

function triggerVenomAnimation() {
  // Hide Venom image
  document.getElementById('venom').style.display = 'none';

  // Play Venom audio (using the globally declared venomAudio)
  venomAudio = new Audio('homepage/heaven/sounds/venom.mp3');  // Make sure the path to venom.mp3 is correct
  venomAudio.volume = 0.1;  // Set the volume as needed
  venomAudio.play();

  // Show "darkangel.gif" covering the screen
  const darkAngelGif = document.createElement('img');
  darkAngelGif.src = 'homepage/heaven/characters/venom/darkangel.gif'; // Ensure this file path is correct
  darkAngelGif.style.position = 'fixed';
  darkAngelGif.style.top = 0;
  darkAngelGif.style.left = 0;
  darkAngelGif.style.width = '100vw';
  darkAngelGif.style.height = '100vh';
  darkAngelGif.style.zIndex = '9999';
  document.body.appendChild(darkAngelGif);

  // Fade out "darkangel.gif"
  setTimeout(() => {
    darkAngelGif.style.transition = 'opacity 1s';
    darkAngelGif.style.opacity = 0;
  }, 2000);

  // After "darkangel.gif" animation ends, remove it and start creating ball images
  setTimeout(() => {
    darkAngelGif.remove();

    // Create 20 "ball.png" elements with random vertical positions, heights, and speeds
    let ballImages = [];
    for (let i = 0; i < 20; i++) {
      const ballImage = document.createElement('img');
      ballImage.src = 'homepage/heaven/characters/venom/ball.png';  // Ensure this file path is correct
      ballImage.style.position = 'absolute';
      ballImage.style.right = '-100px'; // Start off the screen on the right
      ballImage.style.top = `${Math.random() * window.innerHeight}px`; // Random vertical position
      ballImage.style.height = `${Math.random() * 100 + 50}px`; // Random height between 50px and 150px
      ballImage.style.transition = `right ${Math.random() * 4 + 3}s linear`; // Random speed between 3 and 7 seconds

      document.body.appendChild(ballImage);
      ballImages.push(ballImage);
      
      // Trigger the animation to move the image to the left
      setTimeout(() => {
        ballImage.style.right = `${window.innerWidth + 100}px`; // Move to the left
      }, 50); // Start the animation slightly after being added
    }

    // Remove images after they reach the left side and reset everything
    setTimeout(() => {
      ballImages.forEach(ballImage => {
        ballImage.remove();
      });
      resetState();  // Reset the state when animation ends

      // Stop and reset the venom audio
      if (venomAudio) {
        venomAudio.pause();  // Stop the audio
        venomAudio.currentTime = 0;  // Reset the playback to the beginning
      }
    }, 7000); // After the images have moved across the screen
  }, 3000); // Adjust time to match the length of your darkangel.gif
}
